server:
  port: 8080

spring:
  application:
    name: gateway-admin
  profiles:
    active: dev
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:file:./data/gateway_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;AUTO_SERVER=TRUE
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      password:
      database: 0
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
  cloud:
    # Config Center type: nacos (default) or consul
    # gateway.center.type=nacos -> uses NacosConfigCenterService
    # gateway.center.type=consul -> uses ConsulConfigCenterService
    nacos:
      config:
        server-addr: 127.0.0.1:8848
        namespace: public
        group: DEFAULT_GROUP
        file-extension: json
        import-check:
          enabled: false
        extension-configs:
          - data-id: gateway-routes.json
            group: DEFAULT_GROUP
            refresh: true
          - data-id: gateway-services.json
            group: DEFAULT_GROUP
            refresh: true
          - data-id: gateway-plugins.json
            group: DEFAULT_GROUP
            refresh: true
      discovery:
        server-addr: 127.0.0.1:8848
        namespace: public
        group: DEFAULT_GROUP
    consul:
      host: 127.0.0.1
      port: 8500
      discovery:
        enabled: false  # Disable service discovery for admin console
      config:
        enabled: true
        prefix: config
        profile-separator: ','
        format: JSON
        watch:
          enabled: true
          wait: 10s

gateway:
  center:
    type: nacos  # default config center type, can be 'nacos' or 'consul'
  admin:
    jwt:
      secret: ${GATEWAY_ADMIN_JWT_SECRET:mySecretKeyForJWTTokenGenerationWhichMustBeLongEnoughAndSecure}
      expiration: 86400000  # 24 hours in milliseconds
  consul:
    host: 127.0.0.1
    port: 8500
    prefix: config
  nacos:
    data-ids:
      routes: gateway-routes.json
      services: gateway-services.json
      plugins: gateway-plugins.json
      group: DEFAULT_GROUP

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.alibaba.nacos: INFO
    com.example.gatewayadmin: DEBUG
