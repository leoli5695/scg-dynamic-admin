rules:
  - !SHARDING
    tables:
      seckill_order:
        actualDataNodes: ds_${0..7}.order_${0..15}
        databaseStrategy:
          standard:
            shardingColumn: user_id
            shardingAlgorithmName: order_db_inline
        tableStrategy:
          standard:
            shardingColumn: user_id
            shardingAlgorithmName: order_table_inline
        keyGenerateStrategy:
          column: id
          keyGeneratorName: snowflake

      transaction_log:
        actualDataNodes: ds_0.transaction_log

      seckill_activity:
        actualDataNodes: ds_0.seckill_activity

      seckill_product:
        actualDataNodes: ds_0.seckill_product

      stock_reconciliation:
        actualDataNodes: ds_0.stock_reconciliation

    shardingAlgorithms:
      order_db_inline:
        type: INLINE
        props:
          algorithm-expression: ds_${user_id % 8}
      order_table_inline:
        type: INLINE
        props:
          algorithm-expression: order_${user_id % 16}

    keyGenerators:
      snowflake:
        type: SNOWFLAKE
        props:
          worker-id: 1

props:
  sql-show: true
  sql-show-format: true