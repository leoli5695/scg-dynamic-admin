# ============================================================================
# Seckill Core Engine - 主配置文件
# ============================================================================

spring:
  application:
    name: seckill-core-engine

  profiles:
    active: dev

  # Nacos 配置中心（本地开发禁用）
  cloud:
    nacos:
      config:
        enabled: false

  # Redis 配置（连接K8s test命名空间的Redis）
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:30379}
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 200
          max-idle: 50
          min-idle: 10
          max-wait: 1000ms

  # MySQL 数据源配置（使用HikariCP连接池）
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/seckill_db_0?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # Elasticsearch 配置（连接K8s test命名空间的ES）
  elasticsearch:
    uris: ${ES_URIS:http://localhost:30920}
    username: ${ES_USERNAME:}
    password: ${ES_PASSWORD:}

# Redisson 配置
redisson:
  config: |
    singleServerConfig:
      address: "redis://${REDIS_HOST:localhost}:${REDIS_PORT:30379}"
      connectionPoolSize: 100
      connectionMinimumIdleSize: 20
      idleConnectionTimeout: 10000
      connectTimeout: 3000
      timeout: 3000
      retryAttempts: 3
      retryInterval: 1500
      readMode: MASTER

# RocketMQ 配置（连接K8s test命名空间的RocketMQ）
rocketmq:
  name-server: ${ROCKETMQ_NAMESRV:localhost:30976}
  producer:
    enabled: true  # 生产环境启用RocketMQ
    group: seckill-producer-group
    send-message-timeout: 3000
    retry-times-when-send-failed: 2
    retry-times-when-send-async-failed: 2
    compress-message-body-threshold: 4096
    # 事务消息配置
    transaction-message-enable: true
    check-message-immunity-time: 60000  # 事务回查间隔60秒

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.seckill.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# ShardingSphere分片配置已迁移到Java配置类（ShardingSphereJavaConfig.java）

# 监控配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
  prometheus:
    metrics:
      export:
        enabled: true

# 日志配置
logging:
  level:
    root: INFO
    # OPTIMIZATION (P2): Changed from DEBUG to INFO for production
    # Debug logs should only be enabled during troubleshooting
    com.seckill: INFO
    org.apache.rocketmq: INFO
    org.apache.shardingsphere: WARN
    # OPTIMIZATION (P2): Changed from DEBUG to WARN for production
    com.baomidou.mybatisplus: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

# ============================================================================
# Gateway Trace Starter 配置
# ============================================================================
gateway:
  trace:
    admin-url: http://127.0.0.1:9090  # Gateway Admin console URL
    sample-rate: 1.0                  # Sampling rate (100% for dev)
    async-trace-enabled: true         # Enable async thread TraceId propagation

# ============================================================================
# 秒杀引擎核心配置
# ============================================================================
seckill:
  # 热点Key分片数量（将库存分散到8个Key，避免单Key热点）
  shard-count: 8

  # ============================================================================
  # SECURITY FIX (P0): Database credentials externalized
  # ============================================================================
  db:
    host: ${SECKILL_DB_HOST:127.0.0.1}
    port: ${SECKILL_DB_PORT:3306}
    user: ${SECKILL_DB_USER:}  # REQUIRED: Set environment variable
    password: ${SECKILL_DB_PASSWORD:}  # REQUIRED: Set environment variable

  # ShardingSphere SQL logging (disabled for production)
  sharding:
    sql-show: false  # OPTIMIZATION (P0): Disabled for performance

  # ============================================================================
  # SECURITY FIX (P1): Anti-scraping configuration
  # ============================================================================
  anti-scraping:
    enabled: true  # Enable anti-scraping mechanism
    ip-rate-limit: 10  # Max requests per IP per second
    user-rate-limit: 5  # Max requests per user per second
    auto-blacklist-threshold: 100  # Auto-blacklist after this many violations
    blacklist-ttl-hours: 24  # Blacklist entry TTL

  # 库存预热配置
  warmup:
    enabled: false  # 本地开发禁用自动预热
    pre-warmup-minutes: 5
    stock-expire-seconds: 3600

  # 延迟队列配置（未支付订单回滚）
  delay:
    delay-level: 17  # RocketMQ延迟级别17 = 20分钟（官方对照：1s,5s,10s,30s,1m,2m,3m,4m,5m,6m,7m,8m,9m,10m,20m,30m,1h,2h）
    unpaid-timeout-seconds: 1200  # 20分钟超时，与delayLevel对应

  # 消费者限流配置
  consumer:
    order-create-rate: 1000  # TPS
    batch-size: 50

  # 雪花ID配置（本地开发固定值）
  snowflake:
    datacenter-id: 1
    worker-id: 1

  # ============================================================================
  # Alert configuration
  # ============================================================================
  alert:
    enabled: false  # Enable alerts in production
    webhook-url: ${ALERT_WEBHOOK_URL:}
    dingtalk-url: ${ALERT_DINGTALK_URL:}
