# ============================================================================
# 开发环境配置 - ShardingSphere分库分表
# ============================================================================

spring:
  main:
    allow-circular-references: true  # 允许循环依赖（MQ降级服务需要）

  cloud:
    nacos:
      config:
        enabled: false  # 开发环境关闭Nacos

  # Redis配置（连接K8s test命名空间的Redis）
  data:
    redis:
      host: localhost
      port: 30379
      database: 0

  # MySQL数据源配置（本地数据库）
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/seckill_db_0?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456

# RocketMQ配置（连接K8s test命名空间的RocketMQ）
rocketmq:
  name-server: localhost:30976
  producer:
    enabled: true  # 开发模式启用RocketMQ

# Redisson配置（连接K8s test命名空间的Redis，无密码）
redisson:
  config: |
    singleServerConfig:
      address: "redis://localhost:30379"
      connectionPoolSize: 50
      connectionMinimumIdleSize: 10

# Elasticsearch配置（连接K8s test命名空间的ES）
spring.elasticsearch:
  uris: http://localhost:30920
  username:
  password:

# Gateway Trace配置（开发环境禁用，避免optional依赖问题）
gateway:
  trace:
    enabled: false
    trace-redis: false
    trace-mq: false
    trace-db: false
    async-trace-enabled: false
    report-middleware: false

logging:
  level:
    root: INFO
    com.seckill: DEBUG
    org.springframework: INFO

# 秒杀引擎配置
seckill:
  shard-count: 8
  production-mode: false  # 开发模式
  db:
    host: 127.0.0.1
    port: 3306
    user: root
    password: 123456
  warmup:
    enabled: false  # 开发模式禁用预热