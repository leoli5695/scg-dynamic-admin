# ============================================================================
# 开发环境配置 - ShardingSphere分库分表
# ============================================================================
#
# ⚠️ SECURITY WARNING: 此配置文件仅供开发环境使用
# - 包含测试默认密码（root/123456），仅用于本地开发
# - 生产环境必须使用 application-prod.yml 或环境变量
# - 绝不可将此文件部署到生产环境！
#
# ============================================================================

spring:
  main:
    allow-circular-references: true  # 允许循环依赖（MQ降级服务需要）

  cloud:
    nacos:
      config:
        enabled: false  # 开发环境关闭Nacos

  # Redis配置（连接K8s test命名空间的Redis）
  data:
    redis:
      host: localhost
      port: 30379
      database: 0

  # MySQL数据源配置（本地数据库）
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/seckill_db_0?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456

# RocketMQ配置（连接K8s test命名空间的RocketMQ）
rocketmq:
  name-server: localhost:30976
  producer:
    enabled: true  # 开发模式启用RocketMQ

# Redisson配置（连接K8s test命名空间的Redis，无密码）
redisson:
  config: |
    singleServerConfig:
      address: "redis://localhost:30379"
      connectionPoolSize: 50
      connectionMinimumIdleSize: 10

# Elasticsearch配置（连接K8s test命名空间的ES）
spring.elasticsearch:
  uris: http://localhost:30920
  username:
  password:

# Gateway Trace配置
gateway:
  trace:
    enabled: true
    admin-url: http://localhost:9090  # Gateway Admin 地址
    trace-redis: true
    trace-mq: true
    trace-db: true
    async-trace-enabled: true
    # 中间件 Exporter 配置（配置驱动方式）
    # 注意：exporter URL 必须与 Prometheus 配置中的 instance 标签一致
    # 只有配置了 exporter URL 的中间件才会上报到 gateway-admin
    # ⚠️ RocketMQ 使用 Console API 监控（exporter v0.0.2 存在 bug，返回空数据）
    middleware-exporters:
      redis: redis-exporter:9121                    # Redis Exporter
      elasticsearch: elasticsearch-exporter:9114   # ES Exporter
      mysql: mysql-exporter:9104                   # MySQL Exporter
      rocketmq-console: localhost:30808            # RocketMQ Console 地址（K8s NodePort）

logging:
  level:
    root: INFO
    com.seckill: DEBUG
    org.springframework: INFO

# 秒杀引擎配置
seckill:
  shard-count: 8
  production-mode: false  # 开发模式（使用测试默认凭据）
  
  # ⚠️ SECURITY WARNING: 以下为开发环境测试凭据
  # 仅用于本地开发和单元测试，生产环境必须设置环境变量
  db:
    host: 127.0.0.1
    port: 3306
    user: root          # 开发测试用，生产必须使用 ${SECKILL_DB_USER}
    password: 123456    # 开发测试用，生产必须使用 ${SECKILL_DB_PASSWORD}
  warmup:
    enabled: true  # 开发模式启用预热（服务启动后自动预热进行中的活动）