# ============================================================================
# Jaeger 部署配置 - 分布式追踪系统
# ============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: jaeger
  namespace: test
  labels:
    app: jaeger
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jaeger
  template:
    metadata:
      labels:
        app: jaeger
    spec:
      containers:
      - name: jaeger
        image: 05feb4b8a268e111bb3c4356701bf0c4.d.1ms.run/jaegertracing/all-in-one:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 16686
          name: ui
        - containerPort: 4318
          name: otlp-http
        - containerPort: 4317
          name: otlp-grpc
        env:
        - name: COLLECTOR_OTLP_ENABLED
          value: "true"
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"

---
apiVersion: v1
kind: Service
metadata:
  name: jaeger
  namespace: test
spec:
  type: NodePort
  selector:
    app: jaeger
  ports:
  # Jaeger UI
  - port: 16686
    targetPort: 16686
    nodePort: 30686
    protocol: TCP
    name: ui
  # OTLP HTTP (OpenTelemetry HTTP/protobuf)
  - port: 4318
    targetPort: 4318
    nodePort: 30263
    protocol: TCP
    name: otlp-http
  # OTLP gRPC (OpenTelemetry gRPC)
  - port: 4317
    targetPort: 4317
    nodePort: 30187
    protocol: TCP
    name: otlp-grpc