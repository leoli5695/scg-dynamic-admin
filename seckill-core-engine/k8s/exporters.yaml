# ============================================================================
# Prometheus Exporters 部署 - 秒杀服务监控
# ============================================================================

---
# Redis Exporter
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-exporter
  namespace: test
  labels:
    app: redis-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis-exporter
  template:
    metadata:
      labels:
        app: redis-exporter
    spec:
      containers:
      - name: redis-exporter
        image: 05feb4b8a268e111bb3c4356701bf0c4.d.1ms.run/oliver006/redis_exporter:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 9121
        env:
        - name: REDIS_ADDR
          value: "redis://redis:6379"
        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "100m"
            memory: "128Mi"

---
apiVersion: v1
kind: Service
metadata:
  name: redis-exporter
  namespace: test
spec:
  type: ClusterIP
  selector:
    app: redis-exporter
  ports:
  - port: 9121
    targetPort: 9121
    name: metrics

---
# Elasticsearch Exporter
apiVersion: apps/v1
kind: Deployment
metadata:
  name: elasticsearch-exporter
  namespace: test
  labels:
    app: elasticsearch-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: elasticsearch-exporter
  template:
    metadata:
      labels:
        app: elasticsearch-exporter
    spec:
      containers:
      - name: elasticsearch-exporter
        image: 05feb4b8a268e111bb3c4356701bf0c4.d.1ms.run/prometheuscommunity/elasticsearch-exporter:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 9114
        env:
        - name: ES_URI
          value: "http://elasticsearch:9200"
        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "100m"
            memory: "128Mi"

---
apiVersion: v1
kind: Service
metadata:
  name: elasticsearch-exporter
  namespace: test
spec:
  type: ClusterIP
  selector:
    app: elasticsearch-exporter
  ports:
  - port: 9114
    targetPort: 9114
    name: metrics

---
# RocketMQ Exporter
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rocketmq-exporter
  namespace: test
  labels:
    app: rocketmq-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rocketmq-exporter
  template:
    metadata:
      labels:
        app: rocketmq-exporter
    spec:
      containers:
      - name: rocketmq-exporter
        image: 05feb4b8a268e111bb3c4356701bf0c4.d.1ms.run/apache/rocketmq-exporter:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5557
        env:
        - name: ROCKETMQ_NAMESRV_ADDR
          value: "rocketmq-nameserver:9876"
        resources:
          requests:
            cpu: "50m"
            memory: "128Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"

---
apiVersion: v1
kind: Service
metadata:
  name: rocketmq-exporter
  namespace: test
spec:
  type: ClusterIP
  selector:
    app: rocketmq-exporter
  ports:
  - port: 5557
    targetPort: 5557
    name: metrics