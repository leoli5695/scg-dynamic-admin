server:
  port: 80

spring:
  application:
    name: my-gateway
  config:
    import: optional:nacos:application.yml
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      password:
      database: 0
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
        namespace: ""
      config:
        server-addr: 127.0.0.1:8848
        namespace: ""
        file-extension: yaml
        shared-configs:
          - data-id: gateway-routes.json
            refresh: true
    gateway:
      discovery:
        locator:
          enabled: true
      httpclient:
        pool:
          type: ELASTIC

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    com.alibaba.nacos: INFO
