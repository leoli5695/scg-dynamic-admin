server:
  port: ${SERVER_PORT:80}  # HTTP port
  # HTTPS Configuration - disabled by default, use dynamic SSL loading via gateway.ssl.enabled
  ssl:
    enabled: ${SERVER_SSL_ENABLED:false}
  # Additional HTTPS port
  http2:
    enabled: true

spring:
  main:
    web-application-type: reactive
  web:
    resources:
      add-mappings: false  # 禁用静态资源映射（避免/**被其他handler匹配）
  application:
    name: my-gateway
  config:
    import:
      - optional:classpath:config/cache-settings.yml
  autoconfigure:
    exclude:
      - org.springframework.cloud.consul.discovery.ConsulDiscoveryClientConfiguration
      - org.springframework.cloud.consul.discovery.ReactiveConsulDiscoveryClientConfiguration
      - org.springframework.cloud.consul.serviceregistry.ConsulAutoServiceRegistrationAutoConfiguration
  cloud:
    # Enable load balancer with DiscoveryClient
    loadbalancer:
      enabled: true
    
    # Nacos Discovery (config is pulled manually, not via Spring Cloud Nacos Config)
    nacos:
      # Direct properties for NacosCenterAutoConfiguration (must be at this level, not under discovery)
      serverAddr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
      namespace: ${NACOS_NAMESPACE:}
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        namespace: ${NACOS_NAMESPACE:}
        ip: 127.0.0.1  # Force registration with localhost IP

    # Consul Configuration (alternative to Nacos)
    consul:
      host: ${CONSUL_HOST:localhost}
      port: ${CONSUL_PORT:8500}
      config:
        enabled: false
        import-check:
          enabled: false
        prefix: ${CONSUL_CONFIG_PREFIX:config}
      discovery:
        enabled: ${CONSUL_DISCOVERY_ENABLED:false}
        health-check-path: ${CONSUL_HEALTH_CHECK_PATH:/actuator/health}
        health-check-interval: ${CONSUL_HEALTH_CHECK_INTERVAL:10s}
      service-registry:
        enabled: ${CONSUL_SERVICE_REGISTRY_ENABLED:false}
      enabled: false  # Explicitly disable Consul

  gateway:
    discovery:
      locator:
        enabled: ${GATEWAY_DISCOVERY_LOCATOR_ENABLED:true}
        # Enable lowerCaseServiceId for easier routing
        lower-case-service-id: ${GATEWAY_LOWER_CASE_SERVICE_ID:false}
      httpclient:
        pool:
          type: ELASTIC
    # Note: Actuator endpoints are available on management port (8081)
    # Access http://gateway:8081/actuator/health or http://gateway:8081/actuator/prometheus

  # Redis Configuration (for distributed rate limiting)
  # Redis is optional - set REDIS_ENABLED=true or REDIS_HOST to enable
  # Supports three deployment modes: single (default), sentinel, cluster
  redis:
    # Deployment mode: single, sentinel, cluster
    # Default: single (standalone instance)
    mode: ${REDIS_MODE:single}

    # --- Common Configuration ---
    password: ${REDIS_PASSWORD:}
    database: ${REDIS_DATABASE:0}
    timeout: ${REDIS_TIMEOUT:2000}

    # --- Single Node Configuration (mode=single) ---
    host: ${REDIS_HOST:127.0.0.1}
    port: ${REDIS_PORT:6379}

    # --- Sentinel Configuration (mode=sentinel) ---
    # Uncomment below for sentinel mode
    # sentinel:
    #   master: ${REDIS_SENTINEL_MASTER:mymaster}
    #   # Comma-separated list of sentinel hosts (host:port,host:port,...)
    #   nodes: ${REDIS_SENTINEL_NODES:}
    #   # Password for sentinel (if required)
    #   password: ${REDIS_SENTINEL_PASSWORD:}

    # --- Cluster Configuration (mode=cluster) ---
    # Uncomment below for cluster mode
    # cluster:
    #   # Comma-separated list of cluster nodes (host:port,host:port,...)
    #   nodes: ${REDIS_CLUSTER_NODES:}
    #   max-redirects: ${REDIS_CLUSTER_MAX_REDIRECTS:3}

    # Connection pool configuration
    lettuce:
      pool:
        max-active: ${REDIS_POOL_MAX_ACTIVE:8}
        max-idle: ${REDIS_POOL_MAX_IDLE:8}
        min-idle: ${REDIS_POOL_MIN_IDLE:0}

# Gateway Center Configuration
# Set type to 'nacos' (default) or 'consul' to switch between config centers
gateway:
  # Request Trace Configuration - for topology Client nodes
  trace:
    capture-all: ${GATEWAY_TRACE_CAPTURE_ALL:true}
    capture-errors: ${GATEWAY_TRACE_CAPTURE_ERRORS:true}
    capture-slow: ${GATEWAY_TRACE_CAPTURE_SLOW:true}
    slow-threshold-ms: ${GATEWAY_TRACE_SLOW_THRESHOLD:3000}
    sampling-rate: ${GATEWAY_TRACE_SAMPLING_RATE:50}
    sampling-rate-for-errors: ${GATEWAY_TRACE_SAMPLING_RATE_ERRORS:100}
    max-body-size: ${GATEWAY_TRACE_MAX_BODY_SIZE:65536}
    include-filter-chain: ${GATEWAY_TRACE_INCLUDE_FILTER_CHAIN:true}
  # Gateway instance identifier (used for trace data and health status reporting)
  instance-id: ${GATEWAY_INSTANCE_ID:gateway-1}
  # Admin service URL for health status sync and API calls
  admin:
    url: ${GATEWAY_ADMIN_URL:http://127.0.0.1:9090}
  
  # Heartbeat Configuration
  # Gateway reports heartbeat to Admin Console for instance health monitoring
  heartbeat:
    enabled: ${GATEWAY_HEARTBEAT_ENABLED:true}
    interval-ms: ${GATEWAY_HEARTBEAT_INTERVAL:10000}
    timeout-ms: ${GATEWAY_HEARTBEAT_TIMEOUT:5000}
    initial-delay-ms: ${GATEWAY_HEARTBEAT_INITIAL_DELAY:30000}
    max-retries: ${GATEWAY_HEARTBEAT_MAX_RETRIES:3}
    retry-interval-ms: ${GATEWAY_HEARTBEAT_RETRY_INTERVAL:1000}
  center:
    type: ${GATEWAY_CENTER_TYPE:nacos}

  # Trusted Proxy Configuration for X-Forwarded-For validation
  # When gateway is behind a reverse proxy (Nginx, CloudFlare, AWS ALB),
  # configure trusted proxy IPs to securely extract real client IP.
  trusted-proxy:
    enabled: ${TRUSTED_PROXY_ENABLED:true}
    # Trust all private network IPs as proxies (10.x, 172.16-31.x, 192.168.x, 127.x)
    # Disable this in public cloud deployments with public-facing load balancers
    trust-private-networks: ${TRUSTED_PROXY_PRIVATE_NETWORKS:true}
    # Additional trusted proxy IPs (optional, supports CIDR notation)
    # Example: proxy-ips: ["1.2.3.4", "5.6.7.0/24"]
    proxy-ips: []
    # Which IP to use from X-Forwarded-For chain: FIRST (client) or LAST (closest proxy)
    position: FIRST
    # Maximum IPs to process in X-Forwarded-For (DoS protection)
    max-forwarded-ips: 10

  # Health Check Configuration
  health:
    enabled: true
    failure-threshold: 3
    recovery-time: 30000
    idle-threshold: 300000
    
    # Active health check interval (milliseconds)
    # Note: Gateway's main responsibility is routing, not health monitoring.
    # Active check is only for fixed nodes (static:// protocol).
    # Passive check handles real-time failures during user calls.
    active-check-interval-ms: 30000
    
    # Health status sync interval (milliseconds)
    # Sync to Admin DB periodically for UI display.
    # Users need time to open console, so 30s is acceptable.
    sync-interval-ms: 30000
    
    # Batch size for health status push
    batch-size: 50
    
    # Network flap detection threshold
    # If more than this number of instances change state at once, it's considered network flap
    network-flap-threshold: 10
  
  # Active Health Check Configuration - DISABLED: Actuator removed
  # health-check:
  #   endpoint: /actuator/health
  #   timeout: 3000
  #   http-enabled: ${GATEWAY_HEALTH_CHECK_HTTP_ENABLED:true}
  #   http-path: ${GATEWAY_HEALTH_CHECK_PATH:/actuator/health}
  
  # Rate Limiter Configuration
  rate-limiter:
    # Redis 限流开关（默认 true，可手动关闭强制使用本地限流）
    redis:
      enabled: ${REDIS_LIMITER_ENABLED:true}

  # SSL/HTTPS Configuration
  ssl:
    # Enable HTTPS on port 443
    enabled: ${GATEWAY_SSL_ENABLED:true}
    # Auto-load certificates from Admin API
    auto-load: ${GATEWAY_SSL_AUTO_LOAD:true}
    # Certificate refresh interval (ms)
    refresh-interval: ${GATEWAY_SSL_REFRESH_INTERVAL:30000}

logging:
  level:
    # 核心日志
    org.springframework.cloud.gateway: ${LOG_LEVEL_GATEWAY:INFO}
    com.alibaba.nacos: ${LOG_LEVEL_NACOS:INFO}
    com.ecwid.consul: ${LOG_LEVEL_CONSUL:INFO}

    # 健康检查相关日志（开发时可调为 DEBUG）
    com.leoli.gateway.health: INFO
    com.leoli.gateway.filter: INFO

    # 【已禁用】告警服务日志 - 避免噪音
    com.leoli.gateway.monitor: WARN
    
    # 抑制自动配置日志噪音
    org.springframework.boot.autoconfigure: WARN
    org.springframework.boot.autoconfigure.condition: WARN
    org.springframework.boot.actuate: WARN
    org.springframework.cloud.client: WARN
    org.springframework.cloud.commons: WARN
# Management/Actuator - Enabled on SAME PORT (port 80) to avoid HttpHandler binding issues
# NOTE: Do NOT configure management.server.port separately - this causes the multi-port HttpHandler conflict
# See: https://github.com/spring-cloud/spring-cloud-gateway/issues/3786
# Prometheus scrapes from http://gateway:80/actuator/prometheus (same port as main application)
management:
  # NO separate management.server.port - use main port 80
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
      gateway_instance_id: ${GATEWAY_INSTANCE_ID:unknown}
  health:
    consul:
      enabled: false
    liveness:
      enabled: true
    readiness:
      enabled: true

