receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:

exporters:
  # 日志导出器 - 开发调试用
  logging:
    verbosity: basic

  # Prometheus 导出器 - 指标数据
  prometheus:
    endpoint: 0.0.0.0:8889

  # OTLP 导出器 - 可连接到后端如 Jaeger、Tempo 等
  # otlp:
  #   endpoint: jaeger:4317

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [logging]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [logging, prometheus]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [logging]