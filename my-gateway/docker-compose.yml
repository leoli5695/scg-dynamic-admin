version: '3.8'

services:
  # Nacos 服务
  nacos:
    image: nacos/nacos-server:v2.3.2
    container_name: nacos
    ports:
      - "8848:8848"
      - "9848:9848"
    environment:
      - MODE=standalone
    networks:
      - nacos-consul-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/v1/ns/instance/list?serviceName=nacos"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  # Consul 服务
  consul:
    image: hashicorp/consul:latest
    container_name: consul
    ports:
      - "8500:8500"
    command: agent -server -bootstrap-expect=1 -ui -client=0.0.0.0
    networks:
      - nacos-consul-network

  # OpenTelemetry Collector
  otel-collector:
    image: otel/opentelemetry-collector:latest
    container_name: otel-collector
    ports:
      - "4317:4317"   # OTLP gRPC receiver
      - "4318:4318"   # OTLP HTTP receiver
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./otelcol-config.yaml:/etc/otelcol/config.yaml:ro
    networks:
      - nacos-consul-network
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # Prometheus 监控
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9091:9090"
    volumes:
      - C:/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    networks:
      - nacos-consul-network
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # Nacos 服务实例
  demo-nacos-1:
    image: demo-service-nacos:1.0.0
    container_name: demo-nacos-1
    ports:
      - "9004:9000"
    depends_on:
      nacos:
        condition: service_healthy
    environment:
      - SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR=nacos:8848
      - SPRING_CLOUD_NACOS_DISCOVERY_IP=127.0.0.1
      - SPRING_CLOUD_NACOS_DISCOVERY_PORT=9004
    networks:
      - nacos-consul-network

  demo-nacos-2:
    image: demo-service-nacos:1.0.0
    container_name: demo-nacos-2
    ports:
      - "9005:9000"
    depends_on:
      nacos:
        condition: service_healthy
    environment:
      - SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR=nacos:8848
      - SPRING_CLOUD_NACOS_DISCOVERY_IP=127.0.0.1
      - SPRING_CLOUD_NACOS_DISCOVERY_PORT=9005
    networks:
      - nacos-consul-network

  # Consul 服务实例
  demo-consul-1:
    image: demo-service-consul:1.0.0
    container_name: demo-consul-1
    ports:
      - "9002:9000"
    depends_on:
      consul:
        condition: service_started
    environment:
      - SPRING_CLOUD_CONSUL_HOST=consul
      - SPRING_CLOUD_CONSUL_PORT=8500
    networks:
      - nacos-consul-network

  demo-consul-2:
    image: demo-service-consul:1.0.0
    container_name: demo-consul-2
    ports:
      - "9003:9000"
    depends_on:
      consul:
        condition: service_started
    environment:
      - SPRING_CLOUD_CONSUL_HOST=consul
      - SPRING_CLOUD_CONSUL_PORT=8500
    networks:
      - nacos-consul-network

networks:
  nacos-consul-network:
    driver: bridge