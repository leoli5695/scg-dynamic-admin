global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # my-gateway metrics - actuator on same port (80) to avoid multi-port HttpHandler conflict
  - job_name: 'my-gateway'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:80']
        labels:
          application: 'my-gateway'

  # gateway-admin 指标 (如果有)
  - job_name: 'gateway-admin'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:9090']
        labels:
          application: 'gateway-admin'