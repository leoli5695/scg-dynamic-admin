---
# Demo Service Nacos - Service (for external access)
apiVersion: v1
kind: Service
metadata:
  name: demo-nacos
  namespace: test
spec:
  type: NodePort
  selector:
    app: demo-nacos
  ports:
  - name: http
    port: 9003
    targetPort: 9003
    nodePort: 30903
  - name: management
    port: 9004
    targetPort: 9004
    nodePort: 30904