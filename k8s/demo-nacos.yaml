---
# Demo Service Nacos - Instance 1
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-nacos-1
  namespace: test
  labels:
    app: demo-nacos
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-nacos
      instance: demo-nacos-1
  template:
    metadata:
      labels:
        app: demo-nacos
        instance: demo-nacos-1
    spec:
      initContainers:
      - name: wait-for-nacos
        image: rancher/mirrored-library-busybox:1.37.0
        imagePullPolicy: IfNotPresent
        command: ['sh', '-c', 'until nc -z nacos 8848; do echo waiting for nacos; sleep 2; done;']
      containers:
      - name: demo-nacos-1
        image: demo-nacos:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 9003
          name: http
        - containerPort: 9004
          name: management
        env:
        - name: SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR
          value: "nacos:8848"
        - name: SPRING_CLOUD_NACOS_DISCOVERY_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: SPRING_CLOUD_NACOS_DISCOVERY_PORT
          value: "9003"
        - name: SERVER_PORT
          value: "9003"
        resources:
          requests:
            cpu: "200m"
            memory: "512Mi"
          limits:
            cpu: "1000m"
            memory: "1Gi"
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 9004
          initialDelaySeconds: 60
          periodSeconds: 15
          timeoutSeconds: 10
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 9004
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5

