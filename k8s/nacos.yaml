---
# Nacos PVC (数据持久化)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nacos-pvc
  namespace: test
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: local-path

---
# Nacos Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nacos
  namespace: test
  labels:
    app: nacos
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nacos
  template:
    metadata:
      labels:
        app: nacos
    spec:
      containers:
      - name: nacos
        image: nacos/nacos-server:v2.2.3
        imagePullPolicy: Never
        ports:
        - containerPort: 8848
          name: client
        - containerPort: 9848
          name: raft
        - containerPort: 9849
          name: raft-internal
        env:
        - name: MODE
          value: "standalone"
        - name: PREFER_HOST_MODE
          value: "hostname"
        - name: NACOS_SERVER_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: NACOS_APPLICATION_PORT
          value: "8848"
        - name: NACOS_SERVER_PORT
          value: "9848"
        - name: JVM_XMS
          value: "512m"
        - name: JVM_XMX
          value: "512m"
        - name: JVM_XMN
          value: "256m"
        resources:
          requests:
            cpu: "500m"
            memory: "1Gi"
          limits:
            cpu: "2000m"
            memory: "2Gi"
        volumeMounts:
        - name: nacos-data
          mountPath: /home/nacos/data
        livenessProbe:
          httpGet:
            path: /nacos/v1/ns/instance/list?serviceName=nacos
            port: 8848
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 10
        readinessProbe:
          httpGet:
            path: /nacos/v1/ns/instance/list?serviceName=nacos
            port: 8848
          initialDelaySeconds: 20
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 10
      volumes:
      - name: nacos-data
        persistentVolumeClaim:
          claimName: nacos-pvc

---
# Nacos Service
apiVersion: v1
kind: Service
metadata:
  name: nacos
  namespace: test
spec:
  type: NodePort
  selector:
    app: nacos
  ports:
  - name: client
    port: 8848
    targetPort: 8848
    nodePort: 30848
  - name: grpc
    port: 9848
    targetPort: 9848
    nodePort: 31848
  - name: raft-internal
    port: 9849
    targetPort: 9849