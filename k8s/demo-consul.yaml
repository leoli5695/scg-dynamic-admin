---
# Demo Service Consul - Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-consul
  namespace: test
  labels:
    app: demo-consul
spec:
  replicas: 2
  selector:
    matchLabels:
      app: demo-consul
  template:
    metadata:
      labels:
        app: demo-consul
    spec:
      initContainers:
      - name: wait-for-consul
        image: busybox:1.36
        command: ['sh', '-c', 'until nc -z consul 8500; do echo waiting for consul; sleep 2; done;']
      containers:
      - name: demo-consul
        image: demo-service-consul:1.0.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 9000
          name: http
        env:
        - name: SPRING_CLOUD_CONSUL_HOST
          value: "consul"
        - name: SPRING_CLOUD_CONSUL_PORT
          value: "8500"
        resources:
          requests:
            cpu: "200m"
            memory: "512Mi"
          limits:
            cpu: "1000m"
            memory: "1Gi"
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 9000
          initialDelaySeconds: 60
          periodSeconds: 15
          timeoutSeconds: 10
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 9000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5

---
# Demo Service Consul - Service
apiVersion: v1
kind: Service
metadata:
  name: demo-consul
  namespace: test
spec:
  type: ClusterIP
  selector:
    app: demo-consul
  ports:
  - name: http
    port: 9000
    targetPort: 9000